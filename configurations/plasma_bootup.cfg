[Simulation parameters]

# System length
Lx = 2.0 cm

# Nx number of cells
Nx = 300

# particles number, in particles per cell
Npart = 100


n_average = 12800


start_step = 0

# time step (10 ps as in the paper)
dT = 1.0e-11 s

# simulation duration (2 microseconds as in the paper)
Nt = 200000


[left boundary]

type = sin

f = 13.56 MHz
V = 200 V

[right boundary]

type = constant
V = 0

[specie electron]

T = 300 K
# Initial electron density: 6.4e5 m^-3 (from paper: 4e-17 ionization degree)
n = 6.4e5 m^-3
diagnostics = n, Power, V, n_evolution, mean_energy_evolution
#EDF number of probes, resolution, max energy
EDF = 1, 100 , 60 eV
#EDFN = 10, 100 , 60 eV
collisions_rates = IONIZATION


[specie Ar+]

T = 300 K
# Same initial density as electrons for quasineutrality
n = 6.4e5 m^-3
diagnostics = n, Power, V, n_evolution, mean_energy_evolution
#injection = fake ionization

[neutral Ar]

T = 300 K
# Neutral density for Ar at 66.6 Pa and 300 K
n = 1.62e22 m^-3